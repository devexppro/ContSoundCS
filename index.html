<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contsound</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 40px; 
            overflow: hidden; 
            background-color: #f4f4f7;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.2) 20px, transparent 20px);
            background-size: 40px 40px, 80px 80px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .container { 
            width: 500px; 
            background: white; 
            padding: 50px; 
            border: 4px solid #000; 
            box-shadow: 12px 12px 0 #000; 
            text-align: center;
        }

        h1 { margin-top: 0; }
        p { color: #666; margin-bottom: 30px; }
        
        .btn { 
            background: #000; 
            color: #fff; 
            padding: 20px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border: 3px solid #000; 
            cursor: pointer; 
            width: 100%;
            display: block;
            text-decoration: none;
            box-sizing: border-box;
            text-align: center;
        }
        
        .btn:hover, .btn:active, .btn:focus { 
            background: #000; 
            color: #fff; 
            transform: none; 
        } 
    </style>
</head>
<body>

<div class="container">
    <h1>Contsound</h1>
    <p>Professional Audio Engine for Windows</p>
    <a href="https://drive.google.com/uc?export=download&id=1QC2mQlPISO3LzLLrIIP_7w-LKhY0kyFj" download="Contsound.exe" class="btn">
        DOWNLOAD APP
    </a>
</div>

</body>
</html>
